<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Complaint - Student Complaint System</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: 50px auto;
      padding: 30px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      color: #c9bebb;
      margin-bottom: 20px;
    }

    input, button {
      padding: 12px;
      margin: 10px 0;
      width: 80%;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: #ff5722;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #e64a19;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    th {
      background: #ff5722;
      color: rgb(211, 186, 186);
    }

    .status-success {
      color: green;
      font-weight: bold;
    }

    .status-pending {
      color: orange;
      font-weight: bold;
    }

    .status-inprogress {
      color: blue;
      font-weight: bold;
    }

    .action-buttons {
      margin-top: 20px;
    }

    .action-buttons button {
      width: 45%;
      margin: 5px 2%;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Track Your Complaint</h2>

    <input type="text" id="studentId" placeholder="Enter your Student ID">
    <button onclick="trackComplaint()">Track Complaint</button>

    <table id="complaintTable" style="display:none;">
      <thead>
        <tr>
          <th>Complaint Type</th>
          <th>Details</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tableBody">
      </tbody>
    </table>

    <div class="action-buttons">
      <button onclick="resetTrack()" style="background:#999;">Check Another Complaint</button>
      <button onclick="goHome()" style="background:#555;">Back to Home</button>
    </div>
  </div>

  <script>
    function trackComplaint() {
      const studentId = document.getElementById('studentId').value.trim();
      const complaints = JSON.parse(localStorage.getItem('complaints')) || [];

      const studentComplaints = complaints.filter(c => c.studentId === studentId);

      const table = document.getElementById('complaintTable');
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';

      if (studentComplaints.length === 0) {
        alert('No complaints found for this Student ID.');
        table.style.display = 'none';
        return;
      }

      studentComplaints.forEach(c => {
        const tr = document.createElement('tr');
        let statusClass = '';
        if (c.status === 'Resolved') statusClass = 'status-success';
        else if (c.status === 'In Progress') statusClass = 'status-inprogress';
        else statusClass = 'status-pending';

        tr.innerHTML = `
          <td>${c.type}</td>
          <td>${c.details}</td>
          <td class="${statusClass}">${c.status === 'Resolved' ? 'Successfully Resolved' : c.status}</td>
        `;
        tbody.appendChild(tr);
      });

      table.style.display = 'table';
    }

    function resetTrack() {
      document.getElementById('studentId').value = '';
      document.getElementById('complaintTable').style.display = 'none';
    }

    function goHome() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
