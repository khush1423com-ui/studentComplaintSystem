<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(45deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
    }

    input {
      padding: 10px;
      margin: 10px;
      width: 80%;
    }

    button {
      padding: 10px 20px;
      background: #4facfe;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Admin Login</h2>
  <input type="text" id="username" placeholder="Username"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  if (
    document.getElementById("username").value === "admin" &&
    document.getElementById("password").value === "1234"
  ) {
    localStorage.setItem("isAdminLoggedIn", "true");
    window.location.href = "admin.html";
  } else {
    alert("Wrong login");
  }
}
</script>

</body>
</html>
